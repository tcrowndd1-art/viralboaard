name: Daily Data Collection

on:
  schedule:
    # 매일 UTC 08:00 (KST 17:00)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests python-dotenv supabase

      - name: Run Phase 1 fetcher
        env:
          YOUTUBE_API_KEY_1: ${{ secrets.YOUTUBE_API_KEY_1 }}
          YOUTUBE_API_KEY_2: ${{ secrets.YOUTUBE_API_KEY_2 }}
          YOUTUBE_API_KEY_3: ${{ secrets.YOUTUBE_API_KEY_3 }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python backend/scripts/fetch_phase1.py

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fetch-log-${{ github.run_id }}
          path: backend/scripts/fetch_log_*.txt
          if-no-files-found: ignore
          retention-days: 7
